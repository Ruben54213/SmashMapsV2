# SmashMapsV2 Configuration

# Prefix for all messages
prefix: "&e&lRaid&6&lMC &8» &7"

# GUI Configuration
gui:
  title: "&e&lKarte &7Erstellen"
  size: 27

  # Map Overview GUI (Crafting Table)
  overview:
    title: "&6&lKarten&7 von &e%player%"
    size: 45 # 5x9

# Items Configuration
items:
  # Item that players get in their inventory to open the GUI
  inventory_item:
    slot: 5 # Slot 5 (0-8 indexing) = Middle position in inventory
    material: DIAMOND
    name: "&b&lKarte &7Erstellen &8&l| &7Rechtsklick"
    lore:
      - "&7Öffne das Menü zum Erstellen"
      - "&7einer neuen Smash-Karte"
      - ""
      - "&e▶ &7Rechtsklick zum Öffnen"

  # Item that opens map overview (Crafting Table)
  map_overview:
    slot: 3 # Slot 4 in inventory
    material: CRAFTING_TABLE
    name: "&6&lKarte &7bearbeiten &8&l| &7Rechtsklick"
    lore:
      - "&7Verwalte deine erstellten Maps"
      - "&7und bearbeite die Einstellungen"
      - ""
      - "&e▶ &7Rechtsklick zum Öffnen"

  # Item shown in the GUI to create a map
  create_map:
    slot: 13 # Middle slot in 3x9 GUI (0-26 indexing)
    material: GOLDEN_PICKAXE
    name: "&6&lSmash Map"
    lore:
      - "&7Klicke hier, um eine neue"
      - "&7Smash-Map zu erstellen"
      - ""
      - "&a▶ &7Linksklick zum Erstellen"

# Messages Configuration
messages:
  map_created: "Deine Map &e%name% &7wurde erfolgreich erstellt!"
  map_name_request: "Wie soll deine Map heißen? Schreibe den Namen in den Chat:"
  map_icon_request: "Droppe jetzt das Item, das als Icon für deine Map verwendet werden soll!"
  map_icon_selected: "Das Item &e%item% &7wurde als Icon für deine Map &e%name% &7ausgewählt!"
  map_limit_reached: "Du hast bereits das Maximum von &e%limit% &7Maps erreicht!"
  invalid_map_name: "&cUngültiger Map-Name '&e%name%&c'! Verwende nur Buchstaben, Zahlen, Leerzeichen und -_"
  map_teleported: "Du wurdest zu deiner Map &e%name% &7teleportiert!"
  world_protected: "Du kannst diese Welt nicht bearbeiten!"
  no_maps_found: "Du hast noch keine Maps erstellt!"
  map_not_found: "&cMap wurde nicht gefunden!"
  map_not_owner: "&cDu bist nicht der Besitzer dieser Map!"
  map_name_already_exists: "&7Der Map-Name &7'&e%name%&7' wird &cbereits &7verwendet!"
  map_name_title: "&aSmash Kartenname"
  map_name_subtitle: "&7Bitte Map-Namen &6eingeben"
  icon_selection_title: "&aSmash Kartenicon"
  icon_selection_subtitle: "&7Bitte Item für Icon &6droppen"
    # No maps GUI messages
  no_maps_title: "&cKeine Maps gefunden"
  no_maps_line1: "&7Du hast noch keine Maps erstellt!"
  no_maps_line2: "&7Nutze den Diamanten um eine zu erstellen."
  exit_map_item_name: "&c&lKarte Verlassen &8&l| &7Rechtsklick"
  lobby_item_name: "&a&lZurück zur Lobby &8&l| &7Rechtsklick"
    # Action messages
  map_exited: "&7Du hast die &eMap&7 verlassen."
  lobby_teleported: "&7Du wirst nun zur &eLobby&7 geschickt.."
# World Configuration
world:
  border_size: 75 # Blocks from center in each direction
  spawn_platform:
    material: STONE
    size: 3 # 3x3 platform

# Sound Configuration
sounds:
  teleport: "ENTITY_ENDERMAN_TELEPORT"
  gui_open: "ui_button_click"
  map_created: "entity_player_levelup"
  error: "entity_villager_no"