# SmashMapsV2 Configuration

# Prefix for all messages
prefix: "§x§B§1§6§B§9§1§lY§x§A§9§5§7§8§4§lu§x§A§2§4§4§7§7§lk§x§9§A§3§0§6§9§li§x§9§2§1§C§5§C§lC§x§9§A§3§0§6§9§lr§x§A§2§4§4§7§7§la§x§A§9§5§7§8§4§lf§x§B§1§6§B§9§1§lt ➥ §7"

# GUI Configuration
gui:
  title: "&e&lKarte &7Erstellen"
  size: 27
  all_maps:
    title: "&6&lKarten &7Übersicht"
    size: 54
  # Map Overview GUI (Crafting Table)
  overview:
    title: "&6&lKarten&7 von &e%player%"
    size: 45 # 5x9

# Items Configuration
items:
  all_maps:
    slot: 0
    material: COMPASS
    name: "&7Alle &c&lKarten &8&l| &7Rechtsklick"
    lore:
      - "&7Öffnet die Übersicht aller Maps"
      - "&7von allen Spielern auf dem Server!"
      - ""
      - "&e▶ &7Rechtsklick zum Öffnen"
  # Item that players get in their inventory to open the GUI
  inventory_item:
    slot: 5 # Slot 5 (0-8 indexing) = Middle position in inventory
    material: DIAMOND
    name: "&b&lKarte &7Erstellen &8&l| &7Rechtsklick"
    lore:
      - "&7Öffne das Menü zum Erstellen"
      - "&7einer neuen Smash-Karte"
      - ""
      - "&e▶ &7Rechtsklick zum Öffnen"

  # Item that opens map overview (Crafting Table)
  map_overview:
    slot: 3 # Slot 4 in inventory
    material: CRAFTING_TABLE
    name: "&6&lKarte &7bearbeiten &8&l| &7Rechtsklick"
    lore:
      - "&7Verwalte deine erstellten Maps"
      - "&7und bearbeite die Einstellungen"
      - ""
      - "&e▶ &7Rechtsklick zum Öffnen"

  # Item shown in the GUI to create a map
  create_map:
    slot: 13 # Middle slot in 3x9 GUI (0-26 indexing)
    material: GOLDEN_PICKAXE
    name: "&6&lSmash Map"
    lore:
      - "&7Klicke hier, um eine neue"
      - "&7Smash-Map zu erstellen"
      - ""
      - "&a▶ &7Linksklick zum Erstellen"

