  border_size: 75 # Blocks from center in each direction
  spawn_platform:
    material: STONE
    size: 3 # 3x3 platform

# Sound Configuration
sounds:
  teleport: "entity_enderman_teleport"
  gui_open: "ui_button_click"
  map_created: "entity_player_levelup"
  success: "entity_player_levelup"
  error: "entity_villager_no"