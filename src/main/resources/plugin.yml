name: SmashMapsV2
version: 1.0
main: net.Ruben54213.SmashMapsV2
api-version: 1.21
depend: []
softdepend: []

commands:
  info:
    description: Zeigt Informationen über eine Map an
    usage: /info [ID oder Name]
    permission: smashmaps.info
  delete:
    description: Löscht eine Map
    usage: /delete [ID oder Name]
  smashmaps:
    description: Lädt das Plugin neu
    usage: /smashmaps reload
  approve:
    description: Genehmigt eine Map
    usage: /approve <ID oder Name>
  save:
    description: Speichert Maps
    usage: /save
  createmap:
    description: Erstellt eine neue Map
    usage: /createmap <Name>
  maps:
    description: Zeigt alle Maps an
    usage: /maps
  rename:
    description: Benennt eine Map um
    usage: /rename <neuer Name>
  confirm:
    description: Bestätigt eine ausstehende Aktion
    usage: /confirm
  setspawn:
    description: Setzt den Server-Spawnpunkt und speichert ihn in spawn.yml
    usage: /setspawn
    permission: yukismash.setspawn
  spawn:
    description: Teleportiert dich zum Server-Spawnpunkt
    usage: /spawn
  rc:
    description: Führt ItemsAdder Reload und ZIP aus
    usage: /rc
    permission: yuki.rc.command

permissions:
  smashmaps.admin:
    description: Vollständige Admin-Berechtigung für alle SmashMaps Funktionen
    default: op
    children:
      smashmaps.build.admin: true
      smashmaps.delete.admin: true
      smashmaps.rename.admin: true
      smashmaps.maplimit.unlimited: true
  smashmaps.build.admin:
    description: Erlaubt das Bauen auf allen Maps
    default: op
  smashmaps.rename.admin:
    description: Erlaubt das Umbenennen aller Maps
    default: op
  smashmaps.delete.admin:
    description: Erlaubt das Löschen aller Maps
    default: op
  smashmaps.maplimit.unlimited:
    description: Unbegrenzte Maps
    default: op
  smashmaps.reload:
    description: Allows reloading the plugin configuration
    default: op
  smashmaps.approve:
    description: Allows approving maps
    default: op
  smashmaps.save:
    description: Allows saving maps to cloud storage
    default: true
  smashmaps.maplimit.*:
    description: Allows specific map limits (1-50)
    default: op
  smashmaps.delete:
    default: op
  smashmaps.info:
    default: op
  yukismash.setspawn:
    description: Erlaubt das Setzen des Server-Spawnpunkts
    default: op


  yuki.rc.command:
    description: Erlaubt den RC-Befehl (/rc)
    default: op
