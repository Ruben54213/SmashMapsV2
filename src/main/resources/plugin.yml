name: SmashMapsV2
version: '${project.version}'
main: net.Ruben54213.SmashMapsV2
api-version: '1.21'
authors: [ Ruben54213 ]
description: Advanced map system for Minecraft servers

commands:
  smashmaps:
    description: Reload the plugin configuration
    usage: /<command>
    permission: smashmaps.reload
  approve:
    description: Approve a map for public visibility
    usage: /<command> <mapname>
    permission: smashmaps.approve
  save:
    description: Save the current map to MinIO cloud storage
    usage: /<command>
    permission: smashmaps.save
  createmap:
    description: Open the map creation GUI
    usage: /<command>
    aliases: [ newmap, mapcreate ]
  maps:
    description: Open your maps overview GUI
    usage: /<command>
    aliases: [ mymaps, mapoverview ]

permissions:
  smashmaps.reload:
    description: Allows reloading the plugin configuration
    default: op
  smashmaps.approve:
    description: Allows approving maps
    default: op
  smashmaps.save:
    description: Allows saving maps to cloud storage
    default: true
  smashmaps.maplimit.unlimited:
    description: Allows unlimited maps
    default: op
  smashmaps.maplimit.*:
    description: Allows specific map limits (1-50)
    default: op
